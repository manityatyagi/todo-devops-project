apiVersion: apps/v1 
kind: Deployment
metadata:
  name: todo-client-deployment
  namespace: todo-ns
  labels:
     app: todo-client-app
spec:
   replicas: 2
   strategy: 
     type: RollingUpdate
     rollingUpdate:
      maxUnavailable: 1
      maxSurge: 1
   selector:
     matchLabels:
        app: todo-client-app
   template:
     metadata:
        labels:
          app: todo-client-app
     spec:
       containers:
         - name: todo-client 
           image: manitya19tyagi/todo-client:latest
           imagePullPolicy: IfNotPresent
           ports:
           - containerPort: 3000
             protocol: TCP
           resources:
             requests:
               memory: "64Mi"
               cpu: "250m"
             limits:
               memory: "128Mi"
               cpu: "500m"