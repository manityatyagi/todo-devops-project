apiVersion: apps/v1
kind: Deployment
metadata:
  name: todo-api-deployment 
  namespace: todo-ns
  labels:
     app: todo-api-app
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 1
  selector:
    matchLabels:
       app: todo-api-app
  template:
    metadata:
      labels:
        app: todo-api-app
    spec:
      containers:
        - name: todo-api
          image: manitya19tyagi/todo-api:latest
          imagePullPolicy: IfNotPresent
          ports:
          - containerPort: 4000
            protocol: TCP
          resources:
            requests:
              memory: "64Mi"
              cpu: "250m"
            limits:
              memory: "128Mi"
              cpu: "500m" 
          livenessProbe: 
            httpGet:
              path: /api/todos 
              port: 4000
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 5
          readinessProbe:
            httpGet:
              path: /health
              port: 4000
            initialDelaySeconds: 7
            periodSeconds: 3
            timeoutSeconds: 4
            failureThreshold: 4
